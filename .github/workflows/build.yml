name: Build Project

on:
  push:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Java check
        run: java -version
      - name: Build with Maven
        run: mvn clean verify
      - name: Upload Jar
        uses: actions/upload-artifact@v4
        with:
          name: springboot-app
          path: target/*.jar